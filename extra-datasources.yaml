apiVersion: v1
kind: ConfigMap
metadata:
  name: extra-datasources
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  prometheus-datasource.yaml: |-
    apiVersion: 1
    datasources:
    - name: Prometheus
      type: prometheus
      uid: prometheus-uid
      access: proxy
      url: "http://prometheus-server:80"
      version: 1
      isDefault: false
      jsonData:
        {}
  tempo-datasource.yaml: |-
    apiVersion: 1
    datasources:
    - name: Tempo
      type: tempo
      uid: tempo-uid
      access: proxy
      url: "http://tempo:3200"
      version: 1
      isDefault: false
      jsonData:
        serviceMap:
          datasourceUid: 'prometheus-uid'
        nodeGraph:
          enabled: true
