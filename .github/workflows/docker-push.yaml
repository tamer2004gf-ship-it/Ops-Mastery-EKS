name: Build and Push All Images

on:
  push:
    branches: [ "main" ]

jobs:
  build-push-all:
    runs-on: ubuntu-latest
    strategy:
      # هذه هي "المصفوفة" السحرية
      matrix:
        service: [frontend, cartservice, checkoutservice, currencyservice, emailservice, loadgenerator, paymentservice, productcatalogservice, recommendationservice, shippingservice, adservice]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # هذا هو المكان الصحيح للـ submodules
          submodules: recursive

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          # هنا لا تضع submodules! فقط الـ context والـ tags
          context: ./microservices-demo/src/${{ matrix.service }}
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/boutique-${{ matrix.service }}:latest