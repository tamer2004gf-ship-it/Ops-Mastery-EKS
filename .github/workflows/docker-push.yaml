name: Build and Push All Images

on:
  push:
    branches: [ "main" ]

jobs:
  build-push-all:
    runs-on: ubuntu-latest
    strategy:
      # هذه هي "المصفوفة" السحرية
      matrix:
        service: [frontend, cartservice, checkoutservice, currencyservice, emailservice, loadgenerator, paymentservice, productcatalogservice, recommendationservice, shippingservice, adservice]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # هذا السطر هو "مفتاح الحل" لمشكلة الـ path not found
          submodules: recursive

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          # تأكد أن المسار يطابق حرفياً ما هو موجود في جهازك
          context: ./microservices-demo/src/frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/frontend:latest