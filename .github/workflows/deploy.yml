name: Deploy to EKS

on:
  push:
    branches:
      - main # (تأكد إن اسم البرانش تبعك main أو master)

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4 # حدثنا النسخة لـ v4 (أحدث وأسرع)

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v3 # حدثنا النسخة لـ v3 (أنظف وبدون تنبيهات)
      with:
        # تم تعديل الأسماء لتطابق الصورة بالضبط
        aws-access-key-id: ${{ secrets.ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.SECRET_ACCESS_KEY }}
        # بما إنك ضفت سر اسمه AWS_REGION، خلينا نستخدمه بدل الكتابة اليدوية
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Connect to EKS Cluster
      # اسم الكلاستر صح بناءً على الصور السابقة
      run: aws eks update-kubeconfig --name tamer-boutique-cluster --region ${{ secrets.AWS_REGION }}
      continue-on-error: true

    - name: Verify connection and Deploy
      run: |
        echo "Testing connection to EKS..."
        kubectl get nodes
        echo "Deploying the latest Ingress configuration..."
        # تأكد إن ملف ingress.yaml موجود في الـ Root تبع المستودع
        kubectl apply -f ingress.yaml -n default
        continue-on-error: true
